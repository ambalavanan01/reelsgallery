<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels Gallery</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Ambient Background -->
    <div class="bg-blobs">
        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>
    </div>

    <!-- Loading Animation -->
    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="#profile-section">
                <i class="fa-brands fa-instagram me-2 fs-3"></i>
                <span>Reels Gallery</span>
            </a>

            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <!-- Main Gallery Content -->
    <main class="container gallery-container">

        <!-- Profile Header Section -->
        <div class="text-center profile-section" id="profile-section">
            <div class="profile-img-container mx-auto mb-3 stories-ring active">
                <div class="profile-img-inner">
                    <!-- Using a placeholder for profile pic, replace src with actual image -->
                    <img src="Profile.png" alt="Profile Picture" class="profile-img">
                </div>
            </div>
            <div class="username-wrapper mt-2 mb-3">
                <a href="https://instagram.com/iam_ambalavanan" target="_blank" class="instagram-link">
                    <i class="fa-brands fa-instagram me-1"></i>
                    <span>@iam_ambalavanan</span>
                    <svg class="verified-badge ms-1" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="20"
                        height="20" viewBox="0 0 48 48" aria-label="Verified" role="img">
                        <polygon fill="#42a5f5"
                            points="29.62,3 33.053,8.308 39.367,8.624 39.686,14.937 44.997,18.367 42.116,23.995 45,29.62 39.692,33.053 39.376,39.367 33.063,39.686 29.633,44.997 24.005,42.116 18.38,45 14.947,39.692 8.633,39.376 8.314,33.063 3.003,29.633 5.884,24.005 3,18.38 8.308,14.947 8.624,8.633 14.937,8.314 18.367,3.003 23.995,5.884">
                        </polygon>
                        <polygon fill="#fff"
                            points="21.396,31.255 14.899,24.76 17.021,22.639 21.428,27.046 30.996,17.772 33.084,19.926">
                        </polygon>
                    </svg>
                </a>
            </div>
            <div class="stats-wrapper mb-4">
                <span class="badge rounded-pill stats-badge px-3 py-2 fw-semibold" id="total-posts-badge"><i
                        class="fa-solid fa-video me-2"></i>0 Posts</span>
            </div>
            <h2 class="section-title mt-3">My Reels Gallery</h2>
            <p class="subtitle mt-3">Explore our curated collection of aesthetic and engaging moments.</p>
        </div>



        <!-- Portrait Videos (9:16) -->
        <div class="video-section d-none" id="portrait-section">
            <h3 class="mb-4 text-start fw-semibold"
                style="color: var(--accent); border-left: 4px solid var(--accent); padding-left: 10px;">Portrait Moments
            </h3>
            <div class="masonry-grid masonry-portrait mb-5" id="portrait-grid">
                <!-- Reels cards dynamically injected here -->
            </div>
        </div>

        <!-- Landscape Videos (16:9) -->
        <div class="video-section d-none" id="landscape-section">
            <h3 class="mb-4 text-start fw-semibold"
                style="color: var(--accent); border-left: 4px solid var(--accent); padding-left: 10px;">Landscape
                Experiences</h3>
            <div class="masonry-grid masonry-landscape" id="landscape-grid">
                <!-- Reels cards dynamically injected here -->
            </div>
        </div>
    </main>

    <!-- Footer Area -->
    <footer class="text-center">
        <div class="container">
            <h5 class="mb-3 fw-semibold">Connect With Me</h5>
            <div class="social-links mb-4">
                <a href="https://instagram.com/iam_ambalavanan" aria-label="Instagram"><i
                        class="fa-brands fa-instagram"></i></a>
                <a href="https://github.com/ambalavanan01" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
            </div>
            <p class="text-muted small mb-0">&copy; 2026 Reels Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- Video Popup Modal -->
    <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-body p-0 position-relative">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                        style="position: absolute; right: 15px; top: 15px; z-index: 10; filter: invert(1);"></button>
                    <video id="modalVideo" controls autoplay playsinline loop
                        style="width: 100%; border-radius: 8px;"></video>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Logic -->
    <script src="script.js"></script>
</body>

</html>
